# File boundary guard.
# Paths with boundary runtime_artifact or generated_local fail the guard by default.

src/**:
  boundary: production
  owner: application-code
  reason: Production source code.

lib/**:
  boundary: production
  owner: application-code
  reason: Production source code.

tests/**:
  boundary: test-contract
  owner: tests
  reason: Behavior and integration contract.

test/**:
  boundary: test-contract
  owner: tests
  reason: Behavior and integration contract.

.ai/work-items/**:
  boundary: manual_owned
  owner: work-item-records
  reason: Work Item audit trail.

.ai/cockpit/current_status.md:
  boundary: generated_by_make
  owner: ai-cockpit
  reason: Generated by make generate-cockpit-status.

.ai/**:
  boundary: manual_owned
  owner: ai-governance
  reason: AI governance configuration.

.github/workflows/**:
  boundary: manual_owned
  owner: ci
  reason: CI workflow configuration.

Makefile:
  boundary: manual_owned
  owner: command-entrypoint
  reason: Shared command entrypoint.

target/**:
  boundary: generated_local
  owner: build
  reason: Local build or generated output.

build/**:
  boundary: generated_local
  owner: build
  reason: Local build output.

dist/**:
  boundary: generated_local
  owner: build
  reason: Local packaged output.

