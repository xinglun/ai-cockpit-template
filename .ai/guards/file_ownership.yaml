# File ownership guard.
# The parser intentionally supports a small YAML subset:
# pattern:
#   owner: name
#   aiWrite: allowed_with_contract | restricted | forbidden
#   reason: short explanation

.ai/guards/**:
  owner: ai-governance
  aiWrite: restricted
  reason: Guard manifests define repository policy and should change only with an explicit Contract.

.ai/work-items/**:
  owner: work-item-records
  aiWrite: allowed_with_contract
  reason: Work Item Contracts and Summaries are the audit trail for AI changes.

.ai/cockpit/current_status.md:
  owner: ai-cockpit
  aiWrite: allowed_with_contract
  reason: Generated by make generate-cockpit-status.

.ai/**:
  owner: ai-governance
  aiWrite: restricted
  reason: AI governance configuration.

AGENTS.md:
  owner: ai-rules
  aiWrite: restricted
  reason: Agent operating rules.

GEMINI.md:
  owner: ai-rules
  aiWrite: restricted
  reason: Gemini operating rules.

Makefile:
  owner: command-entrypoint
  aiWrite: restricted
  reason: Shared local and CI command entrypoint.

.github/workflows/**:
  owner: ci
  aiWrite: restricted
  reason: CI workflow configuration.

.env:
  owner: local-secrets
  aiWrite: forbidden
  reason: May contain local secrets.

.env.*:
  owner: local-secrets
  aiWrite: forbidden
  reason: May contain local secrets.

target/**:
  owner: generated-artifacts
  aiWrite: forbidden
  reason: Local generated output.

