# Agent Risk policy.
# This policy turns common prompt-level agent risks into checkable controls.

version: 1

risks:
  promptIsAdvice:
    control: hard_gate
    reason: Prompt instructions are not enforcement; required Makefile gates must verify the actual diff and Work Item state.
    requiredVerification:
      - "make check-ai-contract"
      - "make check-ai-scope"
      - "make check-ai-agent-risk"
      - "make check-ai-change-summary"
      - "make generate-cockpit-status"
      - "make check-ai-status"

  midTaskDrift:
    control: checkpoint
    reason: Long-running agent work needs a compact reminder of scope, acceptance, unknowns, and verification.
    requiredSummaryField: checkpointEvidence
    requiredStages:
      - before_finish

  unknownOverclaim:
    control: legal_unknown_path
    reason: Agents need a valid way to stop at unknowns, notCodable, or human-decision states instead of inventing implementation details.
    allowedNonCodingExecutionStatuses:
      - defer
      - needs_human_decision
      - block
