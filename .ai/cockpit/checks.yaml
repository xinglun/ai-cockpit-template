# AI Cockpit check catalog.
# Customize commands and selection rules for each repository.

version: 1

checks:
  projectFormat:
    command: make ai-cockpit-project-format-check
    purpose: Verify project formatting.

  projectTest:
    command: make ai-cockpit-project-test
    purpose: Run the project's test suite.

  projectLint:
    command: make ai-cockpit-project-lint
    purpose: Run the project's static checks.

  diffCheck:
    command: make ai-cockpit-diff-check
    purpose: Detect whitespace and patch format problems.

  docsMetadata:
    command: make check-docs-metadata
    purpose: Validate Markdown front matter and supported-stack documentation consistency.

  systemInvariants:
    command: make check-ai-system-invariants
    purpose: Validate release, documentation, stack, CI, and distribution consistency.

  aiProjectProfile:
    command: make check-ai-project-profile
    purpose: Validate the confirmed project boundary Profile schema and approval state.

  aiGuardCalibration:
    command: make check-ai-guard-calibration
    purpose: Validate that confirmed Profile boundaries are represented by Guard policies.

  quality:
    command: make ai-cockpit-quality
    purpose: Run all configured project quality checks.

  aiWorkItem:
    commandTemplate: make check-ai-contract CONTRACT={contractPath}
    purpose: Validate the required Work Item Contract fields.

  aiScope:
    commandTemplate: make check-ai-scope CONTRACT={contractPath}
    purpose: Verify the actual diff is covered by scope and not covered by outOfScope.

  aiDiffOwnership:
    commandTemplate: make check-ai-diff-ownership CONTRACT={contractPath}
    purpose: Preview active, archived, unowned, ambiguous, out-of-scope, and approval-required ownership for changed paths.

  aiGuards:
    command: make check-ai-guards
    purpose: Validate file ownership and boundary guard manifests.

  aiAgentRisk:
    commandTemplate: make check-ai-agent-risk CONTRACT={contractPath} SUMMARY={summaryPath}
    purpose: Hard fail missing or unpassed AI gates, inconsistent unknown/notCodable execution state, or required checkpoint evidence.

  aiCheckpoint:
    commandTemplate: make ai-checkpoint CONTRACT={contractPath} SUMMARY={summaryPath} STAGE=before_finish
    purpose: Print scope, acceptance, unknowns, required verification status, review focus, next action, and checkpoint metadata.

  aiReviewPolicy:
    commandTemplate: make check-ai-review-policy SUMMARY={summaryPath}
    purpose: Report changes that should receive explicit Summary review focus.

  aiPreflight:
    command: make ai-preflight
    purpose: Generate and validate the startup Preflight Review before implementation begins.

  aiBacktrack:
    command: make check-ai-backtrack
    purpose: Report undeclared removal of tests, snapshots, work item evidence, or configured protected patterns.

  aiCoverage:
    command: make check-ai-coverage-guard
    purpose: Report production changes that do not include test changes.

  aiScenarioCoverage:
    commandTemplate: make check-ai-scenario-coverage CONTRACT={contractPath} SUMMARY={summaryPath}
    purpose: Report scenario coverage findings and policy thresholds for medium/high risk Work Items.

  aiPreflightReview:
    commandTemplate: make check-ai-preflight-review CONTRACT={contractPath}
    purpose: Report the derived Preflight Review readiness assessment and enforce any configured gate statuses.

  aiGuidelines:
    commandTemplate: make check-ai-guidelines CONTRACT={contractPath} SUMMARY={summaryPath}
    purpose: Validate that guidelines defined in the Contract are complied with and verified in the Summary.

  aiSummary:
    commandTemplate: make check-ai-change-summary SUMMARY={summaryPath} CONTRACT={contractPath}
    purpose: Validate the AI Change Summary against the Work Item Contract.

  aiStatus:
    commandTemplate: make generate-cockpit-status CONTRACT={contractPath} SUMMARY={summaryPath}
    purpose: Generate the current AI Cockpit status file.

  aiStatusCheck:
    commandTemplate: make check-ai-status CONTRACT={contractPath} SUMMARY={summaryPath}
    purpose: Verify current_status.md matches the Contract and Summary.

  aiStatusConsistency:
    command: make check-ai-status-consistency
    purpose: Verify active Work Item files and current_status.md agree, including no-active state.

  aiStatusRepair:
    command: make repair-ai-status
    purpose: Regenerate current_status.md for no-active state or one paired active Work Item.

# Note: The selectionRules section below is a human- and agent-readable guide
# to assist AI coding agents when structuring contracts. It is not parsed
# or executed programmatically by any automated script in this repository.
selectionRules:
  - Prefer the verification commands declared in the active Work Item Contract.
  - Run Agent Risk Guard before finishing any active Work Item.
  - Run an AI checkpoint before finishing long-running or governance-sensitive tasks.
  - Run Scope Guard before finishing any code-changing task.
  - Run `make ai-preflight` before implementation begins when you want the readiness report surfaced in the startup flow.
  - Run Backtrack Guard when tests, snapshots, generated outputs, or .ai/work-items/** are changed.
  - Run Coverage Guard when production code changes.
  - Run Status Consistency after generating or checking current_status.md.
  - Run Review Policy when .ai/**, agent rules, Makefile, AI scripts, or CI files change.
  - Changes to .ai/**, agent rule files, Makefile, or CI should include review focus in the Summary reviewReadiness field.
  - Customize projectFormat/projectTest/projectLint in the Makefile for Rust, Flutter, TypeScript, Python, or another stack.
