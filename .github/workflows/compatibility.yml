name: compatibility

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck install.sh

  python-platform-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock
      - run: make quality

  lockfile-reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.10"
      - name: Install pip-tools for lockfile verification
        run: python -m pip install --disable-pip-version-check pip-tools
      - name: Verify reproducible dependency lockfile
        run: make check-lockfile-reproducibility

  real-stack-quality:
    strategy:
      fail-fast: false
      matrix:
        stack: [python, go, rust, typescript]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        if: matrix.stack == 'go'
        with:
          go-version: "1.24.4"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        if: matrix.stack == 'rust'
        with:
          toolchain: "1.86.0"
          components: rustfmt, clippy
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        if: matrix.stack == 'typescript'
        with:
          node-version: "24.11.1"
      - name: Create and verify minimal project
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: |
          set -euo pipefail
          project="$(mktemp -d)"
          cd "$project"
          git init -q
          git config user.email test@example.invalid
          git config user.name 'Compatibility CI'
          case "$STACK" in
            python)
              python -m pip install --disable-pip-version-check pytest ruff
              mkdir -p src tests
              printf 'def add(a: int, b: int) -> int:\n    return a + b\n' > src/app.py
              printf 'from src.app import add\n\ndef test_add():\n    assert add(1, 2) == 3\n' > tests/test_app.py
              cat > pyproject.toml <<'EOF'
          [tool.pytest.ini_options]
          testpaths = ["tests"]
          [tool.ruff]
          extend-exclude = [".ai", "scripts"]
          EOF
              python -m ruff format src tests
              ;;
            go)
              go mod init example.invalid/ai-cockpit-smoke
              printf 'package app\n\nfunc Add(a, b int) int { return a + b }\n' > app.go
              printf 'package app\n\nimport "testing"\n\nfunc TestAdd(t *testing.T) { if Add(1, 2) != 3 { t.Fatal("bad sum") } }\n' > app_test.go
              gofmt -w app.go app_test.go
              ;;
            rust)
              cargo init --lib --name ai_cockpit_smoke -q
              printf 'pub fn add(a: i32, b: i32) -> i32 { a + b }\n\n#[cfg(test)]\nmod tests { #[test] fn adds() { assert_eq!(super::add(1, 2), 3); } }\n' > src/lib.rs
              cargo fmt --all
              ;;
            typescript)
              cat > package.json <<'EOF'
          {"scripts":{"format:check":"node -e \"const f=require('fs').readFileSync('index.js','utf8');process.exit(f.endsWith('\\n')?0:1)\"","test":"node --test","lint":"node --check index.js"}}
          EOF
              printf 'exports.add = (a, b) => a + b;\n' > index.js
              printf "const test = require('node:test'); const assert = require('node:assert'); const { add } = require('./index'); test('add', () => assert.equal(add(1, 2), 3));\n" > index.test.js
              ;;
          esac
          git add .
          git commit -qm initial
          "$GITHUB_WORKSPACE/install.sh" --stack "$STACK" --update-makefile
          make ai-cockpit-quality

  extended-real-stack-quality:
    strategy:
      fail-fast: false
      matrix:
        stack: [java, kotlin, ruby, php, csharp]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        if: contains(fromJSON('["java", "kotlin"]'), matrix.stack)
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        if: contains(fromJSON('["java", "kotlin"]'), matrix.stack)
        with:
          gradle-version: "8.12"
      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626
        if: matrix.stack == 'ruby'
        with:
          ruby-version: "3.4.2"
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        if: matrix.stack == 'php'
        with:
          php-version: "8.4"
          tools: composer
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        if: matrix.stack == 'csharp'
        with:
          dotnet-version: "9.0.305"
      - name: Create and verify extended minimal project
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: |
          set -euo pipefail
          project="$(mktemp -d)"
          cd "$project"
          git init -q
          git config user.email test@example.invalid
          git config user.name 'Compatibility CI'
          case "$STACK" in
            java)
              mkdir -p src/main/java/example src/test/java/example
              cat > settings.gradle <<'EOF'
          rootProject.name = 'ai-cockpit-java-smoke'
          EOF
              cat > build.gradle <<'EOF'
          plugins {
              id 'java'
              id 'com.diffplug.spotless' version '7.0.2'
          }
          repositories { mavenCentral() }
          dependencies { testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4' }
          test { useJUnitPlatform() }
          spotless { java { googleJavaFormat() } }
          EOF
              printf 'package example;\n\npublic final class App { private App() {} public static int add(int a, int b) { return a + b; } }\n' > src/main/java/example/App.java
              printf 'package example;\n\nimport static org.junit.jupiter.api.Assertions.assertEquals;\nimport org.junit.jupiter.api.Test;\nclass AppTest { @Test void adds() { assertEquals(3, App.add(1, 2)); } }\n' > src/test/java/example/AppTest.java
              gradle wrapper --gradle-version 8.12
              ./gradlew spotlessApply
              ;;
            kotlin)
              mkdir -p src/main/kotlin/example src/test/kotlin/example
              cat > settings.gradle.kts <<'EOF'
          rootProject.name = "ai-cockpit-kotlin-smoke"
          EOF
              cat > build.gradle.kts <<'EOF'
          plugins {
              kotlin("jvm") version "2.1.20"
              id("com.diffplug.spotless") version "7.0.2"
          }
          repositories { mavenCentral() }
          dependencies { testImplementation(kotlin("test")) }
          tasks.test { useJUnitPlatform() }
          spotless { kotlin { ktfmt() } }
          EOF
              printf 'package example\n\nfun add(a: Int, b: Int): Int = a + b\n' > src/main/kotlin/example/App.kt
              printf 'package example\n\nimport kotlin.test.Test\nimport kotlin.test.assertEquals\nclass AppTest { @Test fun adds() { assertEquals(3, add(1, 2)) } }\n' > src/test/kotlin/example/AppTest.kt
              gradle wrapper --gradle-version 8.12
              ./gradlew spotlessApply
              ;;
            ruby)
              gem install bundler --no-document
              cat > Gemfile <<'EOF'
          source 'https://rubygems.org'
          gem 'minitest', '~> 5.25'
          gem 'rake', '~> 13.2'
          gem 'rubocop', '~> 1.70'
          EOF
              mkdir -p lib test
              printf '# Simple arithmetic fixture.\nmodule App\n  def self.add(left, right)\n    left + right\n  end\nend\n' > lib/app.rb
              printf "require 'minitest/autorun'\nrequire_relative '../lib/app'\nclass AppTest < Minitest::Test\n  def test_add\n    assert_equal(3, App.add(1, 2))\n  end\nend\n" > test/app_test.rb
              printf "require 'rake/testtask'\nRake::TestTask.new { |t| t.pattern = 'test/**/*_test.rb' }\n" > Rakefile
              bundle install --jobs 4 --retry 3
              bundle exec rubocop -A
              ;;
            php)
              mkdir -p src tests
              cat > composer.json <<'EOF'
          {"autoload":{"psr-4":{"App\\":"src/"}},"autoload-dev":{"psr-4":{"App\\Tests\\":"tests/"}},"require-dev":{"friendsofphp/php-cs-fixer":"^3.68","phpstan/phpstan":"^2.1","phpunit/phpunit":"^11.5"}}
          EOF
              cat > src/Calculator.php <<'EOF'
          <?php
          namespace App;
          final class Calculator { public static function add(int $a, int $b): int { return $a + $b; } }
          EOF
              cat > tests/CalculatorTest.php <<'EOF'
          <?php
          namespace App\Tests;
          use App\Calculator;
          use PHPUnit\Framework\TestCase;
          final class CalculatorTest extends TestCase { public function testAdd(): void { self::assertSame(3, Calculator::add(1, 2)); } }
          EOF
              printf 'parameters:\n  paths:\n    - src\n  level: 9\n' > phpstan.neon
              printf '<?xml version="1.0"?><phpunit bootstrap="vendor/autoload.php"><testsuites><testsuite name="smoke"><directory>tests</directory></testsuite></testsuites></phpunit>\n' > phpunit.xml
              printf '<?php return (new PhpCsFixer\\Config())->setRules(["@PSR12" => true])->setFinder(PhpCsFixer\\Finder::create()->in(__DIR__ . "/src")->in(__DIR__ . "/tests"));\n' > .php-cs-fixer.php
              composer install --no-interaction --no-progress
              vendor/bin/php-cs-fixer fix
              ;;
            csharp)
              dotnet new sln -n Smoke
              solution="$(find . -maxdepth 1 -type f -name 'Smoke.sln*' -print -quit)"
              test -n "$solution"
              dotnet new classlib -n App -o src/App
              dotnet new xunit -n App.Tests -o tests/App.Tests
              dotnet sln "$solution" add src/App/App.csproj tests/App.Tests/App.Tests.csproj
              dotnet add tests/App.Tests/App.Tests.csproj reference src/App/App.csproj
              printf 'namespace App; public static class Calculator { public static int Add(int a, int b) => a + b; }\n' > src/App/Calculator.cs
              printf 'using App; namespace App.Tests; public class CalculatorTests { [Fact] public void Adds() => Assert.Equal(3, Calculator.Add(1, 2)); }\n' > tests/App.Tests/CalculatorTests.cs
              dotnet format "$solution"
              ;;
          esac
          git add .
          git commit -qm initial
          "$GITHUB_WORKSPACE/install.sh" --stack "$STACK" --update-makefile
          make ai-cockpit-quality

  mobile-stack-quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: flutter
            os: ubuntu-latest
          - stack: android
            os: ubuntu-latest
          - stack: swift
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        if: matrix.stack == 'flutter'
        with:
          flutter-version: "3.29.3"
          cache: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        if: matrix.stack == 'android'
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699
        if: matrix.stack == 'android'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        if: matrix.stack == 'android'
        with:
          gradle-version: "8.12"
      - name: Create and verify mobile minimal project
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: |
          set -euo pipefail
          project="$(mktemp -d)"
          cd "$project"
          git init -q
          git config user.email test@example.invalid
          git config user.name 'Compatibility CI'
          case "$STACK" in
            flutter)
              flutter create --org com.example.invalid --project-name ai_cockpit_smoke .
              dart format .
              ;;
            android)
              mkdir -p app/src/main/java/example/smoke app/src/test/java/example/smoke app/src/main
              cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "ai-cockpit-android-smoke"
          include(":app")
          EOF
              cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("com.diffplug.spotless") version "7.0.2" apply false
          }
          EOF
              cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("com.diffplug.spotless")
          }
          android {
              namespace = "example.smoke"
              compileSdk = 35
              defaultConfig {
                  applicationId = "example.smoke"
                  minSdk = 24
                  targetSdk = 35
              }
          }
          repositories { google(); mavenCentral() }
          dependencies { testImplementation("junit:junit:4.13.2") }
          spotless { java { googleJavaFormat() } }
          EOF
              cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" />
          EOF
              printf 'package example.smoke;\n\npublic final class App { private App() {} public static int add(int a, int b) { return a + b; } }\n' > app/src/main/java/example/smoke/App.java
              printf 'package example.smoke;\n\nimport org.junit.Test;\nimport static org.junit.Assert.assertEquals;\npublic class AppTest { @Test public void adds() { assertEquals(3, App.add(1, 2)); } }\n' > app/src/test/java/example/smoke/AppTest.java
              cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
              gradle wrapper --gradle-version 8.12
              ./gradlew spotlessApply
              ;;
            swift)
              brew install swift-format
              mkdir -p Sources/AiCockpitSmoke Tests/AiCockpitSmokeTests
              cat > Package.swift <<'EOF'
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "AiCockpitSmoke",
              targets: [
                  .target(name: "AiCockpitSmoke"),
                  .testTarget(name: "AiCockpitSmokeTests", dependencies: ["AiCockpitSmoke"]),
              ]
          )
          EOF
              cat > Sources/AiCockpitSmoke/App.swift <<'EOF'
          public enum App {
              public static func add(_ a: Int, _ b: Int) -> Int { a + b }
          }
          EOF
              cat > Tests/AiCockpitSmokeTests/AppTests.swift <<'EOF'
          import XCTest
          @testable import AiCockpitSmoke
          final class AppTests: XCTestCase {
              func testAdds() { XCTAssertEqual(App.add(1, 2), 3) }
          }
          EOF
              swift format format --recursive .
              ;;
          esac
          git add .
          git commit -qm initial
          "$GITHUB_WORKSPACE/install.sh" --stack "$STACK" --update-makefile
          make ai-cockpit-quality

  latest-ecosystem-probe:
    name: latest ecosystem probe (${{ matrix.stack }})
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: python
            os: ubuntu-latest
          - stack: go
            os: ubuntu-latest
          - stack: typescript
            os: ubuntu-latest
          - stack: ruby
            os: ubuntu-latest
          - stack: php
            os: ubuntu-latest
          - stack: swift
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        if: matrix.stack == 'python'
        with:
          python-version: "3.x"
          check-latest: true
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        if: matrix.stack == 'go'
        with:
          go-version: stable
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        if: matrix.stack == 'typescript'
        with:
          node-version: node
          check-latest: true
      - uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626
        if: matrix.stack == 'ruby'
        with:
          ruby-version: ruby-head
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        if: matrix.stack == 'php'
        with:
          php-version: latest
          tools: composer
      - name: Probe Swift toolchain
        if: matrix.stack == 'swift'
        run: |
          swift --version
          brew install swift-format
          swift format --version
      - name: Probe current toolchain
        env:
          STACK: ${{ matrix.stack }}
        run: |
          set -euo pipefail
          case "$STACK" in
            python) python --version; python -m pip --version ;;
            go) go version ;;
            typescript) node --version; npm --version ;;
            ruby) ruby --version; gem --version ;;
            php) php --version; composer --version ;;
          esac

  compatibility-gate:
    if: ${{ always() }}
    needs:
      - shellcheck
      - python-platform-matrix
      - real-stack-quality
      - extended-real-stack-quality
      - mobile-stack-quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every compatibility lane to pass
        env:
          SHELLCHECK_RESULT: ${{ needs.shellcheck.result }}
          PYTHON_RESULT: ${{ needs.python-platform-matrix.result }}
          REAL_STACK_RESULT: ${{ needs.real-stack-quality.result }}
          EXTENDED_STACK_RESULT: ${{ needs.extended-real-stack-quality.result }}
          MOBILE_STACK_RESULT: ${{ needs.mobile-stack-quality.result }}
        run: |
          set -euo pipefail
          for result in "$SHELLCHECK_RESULT" "$PYTHON_RESULT" "$REAL_STACK_RESULT" "$EXTENDED_STACK_RESULT" "$MOBILE_STACK_RESULT"; do
            test "$result" = success
          done

  compatibility-latest:
    if: ${{ always() }}
    needs:
      - latest-ecosystem-probe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report latest ecosystem probe outcomes
        env:
          LATEST_RESULT: ${{ needs.latest-ecosystem-probe.result }}
        run: |
          printf 'compatibility-latest ecosystem-probe=%s\n' "$LATEST_RESULT"
          printf '%s\n' 'Hosted ecosystem probe outcomes are reported separately; the fixed compatibility baseline is the blocking release gate. Latest probes are exploratory and non-blocking, not verified support.'
