# Coverage Guard policy.
# Blocking by default in this template. Set reportOnly: true to make it advisory.

version: 1
reportOnly: false
# Set true only after reviewing every path below against the adopted project.
adoptionReviewed: false

production:
  include:
    - "src/**"
    - "**/src/**"
    - "lib/**"
    - "**/lib/**"
    - "app/src/main/**"
    - "**/src/main/**"
    - "Sources/**"
    - "**/Sources/**"
    - "*.go"
    - "*.cs"
    - "*.ts"
    - "*.tsx"
    - "*.js"
    - "*.jsx"
    - "*.java"
    - "*.kt"
    - "*.kts"
    - "*.swift"
    - "*.rs"
    - "*.dart"
    - "*.rb"
    - "*.php"
    - "**/*.cs"
    - "scripts/ai_*.py"
  exclude:
    - "tests/**"
    - "**/tests/**"
    - "test/**"
    - "**/test/**"
    - "Tests/**"
    - "**/Tests/**"
    - "*.Tests/**/*"
    - "app/src/test/**"
    - "app/src/androidTest/**"
    - "**/src/test/**"
    - "**/src/androidTest/**"
    - "*test*"
    - "*spec*"
    - "*Test*"
    - "*Spec*"
    - "**/*test*"
    - "**/*spec*"
    - "**/*Test*"
    - "**/*Spec*"

tests:
  include:
    - "tests/**"
    - "**/tests/**"
    - "test/**"
    - "**/test/**"
    - "Tests/**"
    - "**/Tests/**"
    - "*.Tests/**/*"
    - "app/src/test/**"
    - "app/src/androidTest/**"
    - "**/src/test/**"
    - "**/src/androidTest/**"
    - "*test*"
    - "*spec*"
    - "*Test*"
    - "*Spec*"
    - "**/*test*"
    - "**/*spec*"
    - "**/*Test*"
    - "**/*Spec*"

output:
  json: target/ai_coverage_guard_report.json
