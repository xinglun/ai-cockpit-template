# AI Cockpit repository Project Profile. This file is project-owned and is not copied during installation.
version: 1

detectedFacts:
  languages:
    - "python"
  frameworks: []
  buildSystems:
    - "make"
  infrastructure:
    - "github-actions"

suggestedBoundaries:
  productionRoots:
    - "scripts/ai_*.py"
  featureRoots:
    - "scripts/**"
  testRoots:
    - "tests/**"
  generatedPaths:
    - "target/**"
  criticalPaths:
    - ".ai/**"
    - ".github/workflows/**"
    - "Makefile"

approvedBoundaries:
  productionRoots:
    - "scripts/ai_*.py"
  featureRoots:
    - "scripts/**"
  testRoots:
    - "tests/**"
  generatedPaths:
    - "target/**"
  criticalPaths:
    - ".ai/**"
    - ".github/workflows/**"
    - "Makefile"

reviewRequirements:
  - "quality"
  - "governance-review"

unknowns: []

evidence:
  - "python|confidence:high|evidence:scripts/*.py"
  - "github-actions|confidence:high|evidence:.github/workflows"
  - "boundaries|confidence:high|evidence:existing Guard policies"

approval:
  reviewed: true
  reviewedBy: "repository maintainer"
  reason: "Existing AI Cockpit repository boundaries are already enforced by the checked-in Guard policies."
