name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New immutable release tag, for example v0.5.25"
        required: true
        type: string
      source_commit:
        description: "Verified main commit SHA to release"
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.tag }}
      SOURCE_COMMIT: ${{ inputs.source_commit }}
    steps:
      - name: Initialize exact source checkout
        shell: bash
        run: |
          set -euo pipefail
          git init -q "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          gh auth setup-git
          remote_head="$(git ls-remote --symref origin HEAD)"
          mapfile -t default_branches < <(awk '$1 == "ref:" && $2 ~ /^refs\/heads\// {sub(/^refs\/heads\//, "", $2); print $2}' <<<"$remote_head")
          [[ "${#default_branches[@]}" -eq 1 ]]
          RELEASE_REMOTE=origin
          RELEASE_DEFAULT_BRANCH="${default_branches[0]}"
          [[ -n "$RELEASE_DEFAULT_BRANCH" && "$RELEASE_DEFAULT_BRANCH" != *$'\n'* ]]
          export RELEASE_REMOTE RELEASE_DEFAULT_BRANCH
          git fetch --no-tags --quiet origin \
            "refs/heads/${RELEASE_DEFAULT_BRANCH}:refs/remotes/origin/${RELEASE_DEFAULT_BRANCH}"
          DEFAULT_BRANCH_COMMIT="$(git rev-parse "refs/remotes/origin/${RELEASE_DEFAULT_BRANCH}^{commit}")"
          export DEFAULT_BRANCH_COMMIT
          requested_source_commit="$SOURCE_COMMIT"
          SOURCE_COMMIT="$DEFAULT_BRANCH_COMMIT"
          if [[ -n "$requested_source_commit" && "$requested_source_commit" != "$DEFAULT_BRANCH_COMMIT" ]]; then
            echo "source_commit must equal the freshly resolved default branch commit" >&2
            exit 1
          fi
          export SOURCE_COMMIT
          {
            echo "RELEASE_REMOTE=$RELEASE_REMOTE"
            echo "RELEASE_DEFAULT_BRANCH=$RELEASE_DEFAULT_BRANCH"
            echo "DEFAULT_BRANCH_COMMIT=$DEFAULT_BRANCH_COMMIT"
            echo "SOURCE_COMMIT=$SOURCE_COMMIT"
          } >> "$GITHUB_ENV"
          git fetch --no-tags --quiet origin "${SOURCE_COMMIT}"
          git checkout --detach --quiet "${SOURCE_COMMIT}"
          jq -n \
            --arg sourceCommit "$SOURCE_COMMIT" \
            --arg tagTarget "$SOURCE_COMMIT" \
            --arg metadataCommit "$SOURCE_COMMIT" \
            --arg remote "$RELEASE_REMOTE" \
            --arg defaultBranch "$RELEASE_DEFAULT_BRANCH" \
            --arg runId "$GITHUB_RUN_ID" \
            '{format:"ai-cockpit-release-source",version:1,sourceCommit:$sourceCommit,tagTarget:$tagTarget,metadataCommit:$metadataCommit,remote:$remote,defaultBranch:$defaultBranch,runId:$runId}' \
            > "$RUNNER_TEMP/release-source.json"

      - name: Validate release identity and tag preconditions
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$(git rev-parse HEAD)" == "$SOURCE_COMMIT" ]]
          [[ -s "$RUNNER_TEMP/release-source.json" ]]
          jq -e --arg source "$SOURCE_COMMIT" --arg remote "$RELEASE_REMOTE" \
            --arg branch "$RELEASE_DEFAULT_BRANCH" --arg run "$GITHUB_RUN_ID" \
            '(.sourceCommit == $source and .remote == $remote and .defaultBranch == $branch and .runId == $run)' \
            "$RUNNER_TEMP/release-source.json" >/dev/null
          if git ls-remote --exit-code origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "release tag already exists: ${RELEASE_TAG}" >&2
            exit 1
          fi
          declared_tag="$(git show "${SOURCE_COMMIT}:release.json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["releaseTag"])')"
          [[ "$declared_tag" == "$RELEASE_TAG" ]]
          release_archive_name="$(git show "${SOURCE_COMMIT}:release.json" | jq -r '.releaseArchive.assetName // empty')"
          release_archive_sha="$(git show "${SOURCE_COMMIT}:release.json" | jq -r '.releaseArchive.sha256 // empty')"
          [[ "$release_archive_name" =~ ^[A-Za-z0-9_.-]+$ ]]
          [[ "$release_archive_sha" =~ ^[0-9a-f]{64}$ ]]
          if git cat-file -e "${SOURCE_COMMIT}:next-release.json" 2>/dev/null; then
            git show "${SOURCE_COMMIT}:next-release.json" > "$RUNNER_TEMP/next-release.json"
            python3 - "$RUNNER_TEMP/next-release.json" "${SOURCE_COMMIT}:release.json" <<'PY'
          import json
          import pathlib
          import subprocess
          import sys

          candidate = json.loads(pathlib.Path(sys.argv[1]).read_text())
          published = json.loads(subprocess.check_output(["git", "show", sys.argv[2]], text=True))
          assert candidate["releaseState"] == "candidate"
          assert candidate["published"] is False
          assert candidate["basedOnReleaseTag"] == published["releaseTag"]
          PY
          fi

      - name: Fail closed on release freeze, installer, and source-bound archive
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^{commit})" = "$SOURCE_COMMIT"
          echo "release preflight boundary: head=$(git rev-parse HEAD^{commit}) source=$SOURCE_COMMIT"
          attributes_sha="$(git show "${SOURCE_COMMIT}:.gitattributes" | sha256sum | cut -d' ' -f1)"
          echo "release preflight attributes=$attributes_sha"
          make check-release-preflight RELEASE_PREFLIGHT_SOURCE_COMMIT="$SOURCE_COMMIT"

      - name: Install locked release evidence dependencies
        working-directory: ${{ github.workspace }}
        run: python3 -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock

      - name: Install pinned lockfile compiler
        working-directory: ${{ github.workspace }}
        run: python3 -m pip install --disable-pip-version-check pip-tools==7.6.0 typing-extensions==4.16.0

      - name: Require reproducible dependency lockfile
        working-directory: ${{ github.workspace }}
        run: make check-lockfile-reproducibility

      - name: Require successful exact-SHA smoke and compatibility runs
        shell: bash
        run: |
          set -euo pipefail
          printf '[]\n' > "$RUNNER_TEMP/ci-workflow-runs.json"
          for workflow in smoke.yml compatibility.yml; do
            deadline=$((SECONDS + 900))
            while :; do
              runs="$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow" \
                --commit "$SOURCE_COMMIT" \
                --limit 20 \
                --json status,conclusion,databaseId)"
              if jq -e 'any(.[]; .conclusion == "success")' <<<"$runs" >/dev/null; then
                run_id="$(jq -r 'map(select(.conclusion == "success"))[0].databaseId' <<<"$runs")"
                jobs="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json jobs --jq '[.jobs[] | {name, conclusion}]')"
                required_jobs="$(jq -c '[.[].name] | unique' <<<"$jobs")"
                jq --arg workflow "$workflow" --arg run_id "$run_id" --arg head "$SOURCE_COMMIT" \
                  --argjson jobs "$jobs" --argjson required_jobs "$required_jobs" \
                  '. + [{workflowRunId: $run_id, workflowName: $workflow, headSha: $head, requiredJobNames: $required_jobs, jobs: $jobs, conclusion: "success", failureReasons: []}]' \
                  "$RUNNER_TEMP/ci-workflow-runs.json" > "$RUNNER_TEMP/ci-workflow-runs.next.json"
                mv "$RUNNER_TEMP/ci-workflow-runs.next.json" "$RUNNER_TEMP/ci-workflow-runs.json"
                break
              fi
              if (( SECONDS >= deadline )); then
                echo "timed out waiting for ${workflow} for ${SOURCE_COMMIT}" >&2
                exit 1
              fi
              if jq -e 'any(.[]; .status != "completed")' <<<"$runs" >/dev/null || [[ "$(jq 'length' <<<"$runs")" -eq 0 ]]; then
                sleep 15
                continue
              fi
              echo "no successful ${workflow} run found for ${SOURCE_COMMIT}" >&2
              exit 1
            done
          done

      - name: Generate source-bound release evidence
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 scripts/check_supply_chain.py release-assets \
            --source-commit "$SOURCE_COMMIT" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-sha "$GITHUB_SHA" \
            --release-tag "$RELEASE_TAG" \
            --output-dir "$RUNNER_TEMP/release-evidence"
          sbom_digest="$(sha256sum "$RUNNER_TEMP/release-evidence/sbom.json" | cut -d' ' -f1)"
          provenance_digest="$(sha256sum "$RUNNER_TEMP/release-evidence/provenance.json" | cut -d' ' -f1)"
          jq -n \
            --arg source "$SOURCE_COMMIT" \
            --arg merge "$GITHUB_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg sbom "$sbom_digest" \
            --arg provenance "$provenance_digest" \
            --argjson workflow_runs "$(cat "$RUNNER_TEMP/ci-workflow-runs.json")" \
            '{
              format: "ai-cockpit-ci-release-evidence",
              schemaVersion: 1,
              state: "verified",
              evidenceSource: "github_api",
              workflowRunId: $run_id,
              headSha: $source,
              mergeCommitSha: $merge,
              headToMergeRelationship: "merge_commit_contains_head",
              requiredJobNames: ([$workflow_runs[].requiredJobNames[]] | unique),
              workflowRuns: $workflow_runs,
              conclusion: "success",
              failureReasons: [],
              artifactDigests: {"sbom.json": $sbom, "provenance.json": $provenance},
              sbom: {digest: $sbom, sourceCommit: $source},
              provenance: {digest: $provenance, sourceCommit: $source}
            }' > "$RUNNER_TEMP/release-evidence/ci-release-evidence.json"
          bash scripts/check_ci_release_evidence.sh "$RUNNER_TEMP/release-evidence/ci-release-evidence.json" "$SOURCE_COMMIT"
          archive_name="$(jq -r '.releaseArchive.assetName' release.json)"
          python3 scripts/release_archive.py --root "$GITHUB_WORKSPACE" \
            --source-commit "$SOURCE_COMMIT" \
            --output "$RUNNER_TEMP/release-evidence/$archive_name"
          archive_sha="$(sha256sum "$RUNNER_TEMP/release-evidence/$archive_name" | cut -d' ' -f1)"
          test "$archive_sha" = "$(jq -r '.releaseArchive.sha256' release.json)"

      - name: Verify source-bound release evidence subjects
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/release-evidence"
          test "$(jq -r '.commitSha' "$evidence/provenance.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.sourceCommit' "$evidence/release-digests.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.releaseTag' "$evidence/provenance.json")" = "$RELEASE_TAG"
          test "$(jq -r '.releaseTag' "$evidence/release-digests.json")" = "$RELEASE_TAG"
          test "$(jq -r '.correlation.workflowRunId' "$evidence/release-digests.json")" = "$GITHUB_RUN_ID"
          test "$(jq -r '.correlation.workflowRunSha' "$evidence/release-digests.json")" = "$GITHUB_SHA"
          test "$(jq -r '.correlation.sourceCommit' "$evidence/release-digests.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.correlation.releaseTag' "$evidence/release-digests.json")" = "$RELEASE_TAG"
          sbom_digest="$(sha256sum "$evidence/sbom.json" | cut -d' ' -f1)"
          provenance_digest="$(sha256sum "$evidence/provenance.json" | cut -d' ' -f1)"
          test "$(jq -r '.artifacts[".ai/cockpit/sbom.json"]' "$evidence/release-digests.json")" = "$sbom_digest"
          test "$(jq -r '.artifacts[".ai/cockpit/provenance.json"]' "$evidence/release-digests.json")" = "$provenance_digest"
          archive_name="$(jq -r '.releaseArchive.assetName' release.json)"
          test "$(jq -r '.releaseArchive.sha256' release.json)" = "$(sha256sum "$evidence/$archive_name" | cut -d' ' -f1)"

      - name: Bind the generated evidence bundle digest
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/release-evidence"
          bundle_digest="$(find "$evidence" -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)"
          [[ "$bundle_digest" =~ ^[0-9a-f]{64}$ ]]
          printf '%s\n' "$bundle_digest" > "$evidence/evidence-bundle-digest.txt"
          jq --arg digest "$bundle_digest" '.evidenceBundleDigest = $digest' \
            "$RUNNER_TEMP/release-source.json" > "$RUNNER_TEMP/release-source.with-digest.json"
          mv "$RUNNER_TEMP/release-source.with-digest.json" "$RUNNER_TEMP/release-source.json"
          echo "EVIDENCE_BUNDLE_DIGEST=$bundle_digest" >> "$GITHUB_ENV"

      - name: Dispatch strict smoke verification for verified source commit
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          gh workflow run smoke.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
          run_id=""
          deadline=$((SECONDS + 120))
          while [[ -z "$run_id" ]]; do
            run_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow smoke.yml \
              --commit "$SOURCE_COMMIT" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            if [[ -n "$run_id" ]]; then break; fi
            if (( SECONDS >= deadline )); then
              echo "timed out waiting for source smoke dispatch" >&2
              exit 1
            fi
            sleep 5
          done
          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status

      - name: Create exact-SHA tag and Draft GitHub Release
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git push origin "$SOURCE_COMMIT:refs/tags/$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SOURCE_COMMIT" \
            --title "$RELEASE_TAG" \
            --draft \
            --generate-notes \
            "$RUNNER_TEMP/release-evidence/sbom.json#sbom.json" \
            "$RUNNER_TEMP/release-evidence/provenance.json#provenance.json" \
            "$RUNNER_TEMP/release-evidence/release-digests.json#release-digests.json" \
            "$RUNNER_TEMP/release-evidence/ci-release-evidence.json#ci-release-evidence.json" \
            "$RUNNER_TEMP/release-source.json#release-source.json" \
            "$RUNNER_TEMP/release-evidence/$(jq -r '.releaseArchive.assetName' release.json)#$(jq -r '.releaseArchive.assetName' release.json)"

      - name: Verify Draft tag target and release asset subjects
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git fetch --no-tags --quiet origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-parse "$RELEASE_TAG^{commit}")" = "$SOURCE_COMMIT"
          test "$(jq -r '.commitSha' "$RUNNER_TEMP/release-evidence/provenance.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.sourceCommit' "$RUNNER_TEMP/release-evidence/release-digests.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.releaseTag' "$RUNNER_TEMP/release-evidence/provenance.json")" = "$RELEASE_TAG"
          test "$(jq -r '.releaseTag' "$RUNNER_TEMP/release-evidence/release-digests.json")" = "$RELEASE_TAG"
          test "$(jq -r '.correlation.workflowRunId' "$RUNNER_TEMP/release-evidence/release-digests.json")" = "$GITHUB_RUN_ID"
          test "$(jq -r '.correlation.workflowRunSha' "$RUNNER_TEMP/release-evidence/release-digests.json")" = "$GITHUB_SHA"
          test "$(jq -r '.sourceCommit' "$RUNNER_TEMP/release-source.json")" = "$SOURCE_COMMIT"
          test "$(jq -r '.remote' "$RUNNER_TEMP/release-source.json")" = "$RELEASE_REMOTE"
          test "$(jq -r '.defaultBranch' "$RUNNER_TEMP/release-source.json")" = "$RELEASE_DEFAULT_BRANCH"
          test "$(jq -r '.runId' "$RUNNER_TEMP/release-source.json")" = "$GITHUB_RUN_ID"
          test "$(jq -r '.evidenceBundleDigest' "$RUNNER_TEMP/release-source.json")" = "$EVIDENCE_BUNDLE_DIGEST"
          bash scripts/check_ci_release_evidence.sh "$RUNNER_TEMP/release-evidence/ci-release-evidence.json" "$SOURCE_COMMIT"

      - name: Verify tagged Quick Install contract before publication
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          archive_name="$(jq -r '.releaseArchive.assetName' release.json)"
          download_dir="$RUNNER_TEMP/tagged-install"
          mkdir -p "$download_dir"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$archive_name" \
            --dir "$download_dir"
          verified_archive="$download_dir/$archive_name"
          test "$(sha256sum "$verified_archive" | cut -d' ' -f1)" = \
            "$(jq -r '.releaseArchive.sha256' release.json)"
          verified_archive_url="$(python3 -c \
            'import pathlib,sys; print(pathlib.Path(sys.argv[1]).resolve().as_uri())' \
            "$verified_archive")"
          python3 scripts/verify_quick_install_release.py \
            --root "$GITHUB_WORKSPACE" \
            --ref "$RELEASE_TAG" \
            --asset-url "$verified_archive_url"

      - name: Publish verified Draft Release
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
