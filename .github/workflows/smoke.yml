name: smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  template-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Select governance diff baseline
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base="${{ github.event.before }}"
          else
            base="$(git rev-parse HEAD)"
          fi
          printf 'AI_BASE_COMMIT=%s\n' "$base" >> "$GITHUB_ENV"

      - name: Install development quality tools
        run: python3 -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.lock

      - name: Run repository quality gates
        run: make quality

      - name: Verify clean-checkout Cockpit status consistency
        run: make check-ai-status-consistency

      - name: Verify documented public release contract
        env:
          AI_RELEASE_PREPARATION: ${{ (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && '1' || '0' }}
        run: make check-release-distribution

      - name: Verify supply-chain evidence
        run: make check-sbom check-provenance check-secret-scanning

      - name: Run template AI checks
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            make check-ai-pr AI_BASE_COMMIT="$AI_BASE_COMMIT"
          else
            make check-ai-status-consistency
            make check-ai-backtrack
            make check-ai-coverage-guard
            make check-ai-diff-ownership
          fi

      - name: Installer dry run
        run: |
          tmp="$(mktemp -d)"
          git init -b main "$tmp"
          (
            cd "$tmp"
            printf 'include Makefile.ai\n' > Makefile
            "$GITHUB_WORKSPACE/install.sh" --stack rust --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack go --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack java --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack kotlin --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack swift --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack ruby --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack php --dry-run
            "$GITHUB_WORKSPACE/install.sh" --stack csharp --dry-run
          )

      - name: Install into temporary repository
        run: |
          tmp="$(mktemp -d)"
          git init -b main "$tmp"
          (
            cd "$tmp"
            unset AI_BASE_COMMIT
            git config user.email test@example.invalid
            git config user.name 'CI Smoke'
            printf 'include Makefile.ai\n' > Makefile
            git add Makefile
            git commit -m 'initial host project'
            base="$(git rev-parse HEAD)"
            "$GITHUB_WORKSPACE/install.sh" --stack generic --with-examples --create-adoption
            test -f scripts/ai_check_pr.py
            grep -q '^check-ai-pr:' Makefile.ai
            test -f examples/csharp/README.md
            test -f examples/go/README.md
            test -f examples/java/README.md
            test -f examples/kotlin/README.md
            test -f examples/php/README.md
            test -f examples/python/README.md
            test -f examples/ruby/README.md
            test -f examples/swift/README.md
            python3 -m py_compile scripts/*.py
            find scripts -type d -name __pycache__ -prune -exec rm -rf {} +
            if make ai-cockpit-quality; then
              echo 'generic quality must fail until project checks are configured' >&2
              exit 1
            fi
            make ai-finish TASK=adopt_ai_cockpit
            git add .
            git commit -m 'install template'
            make check-ai-status-consistency
            make check-ai-backtrack
            make check-ai-coverage-guard
            make check-ai-diff-ownership
            make check-ai-pr AI_BASE_COMMIT="$base"
            make ai-start TASK=ci_smoke TITLE="CI smoke" MODE=investigate
            python3 -c 'import json; from pathlib import Path; path = Path(".ai/work-items/active/ci_smoke.contract.json"); contract = json.loads(path.read_text()); contract["scope"].append(".ai/guards/scope_policy.yaml"); contract["restrictedWriteApproval"] = {"approved": True, "approvedBy": "CI smoke", "reason": "Verify installed Makefile.ai passes Contract approval to the guard."}; path.write_text(json.dumps(contract, indent=2) + "\n")'
            printf '\n# install smoke restricted approval\n' >> .ai/guards/scope_policy.yaml
            make check-ai-guards CONTRACT=.ai/work-items/active/ci_smoke.contract.json
          )

      - name: Reinstall is idempotent
        run: |
          tmp="$(mktemp -d)"
          git init -b main "$tmp"
          (
            cd "$tmp"
            printf '# Existing\n' > AGENTS.md
            printf '# Gemini\n' > GEMINI.md
            printf 'all:\n\t@true\n' > Makefile
            "$GITHUB_WORKSPACE/install.sh" --stack typescript --update-makefile
            "$GITHUB_WORKSPACE/install.sh" --stack typescript --dry-run --update-makefile
          )
