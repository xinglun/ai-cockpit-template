# Coverage Guard policy.
# Blocking by default in this template. Set reportOnly: true to make it advisory.

version: 1
reportOnly: false
# Set true only after reviewing every path below against the adopted project.
adoptionReviewed: false

production:
  include:
    - "src/**"
    - "**/src/**"
    - "lib/**"
    - "**/lib/**"
    - "app/src/main/**"
    - "**/src/main/**"
    - "Sources/**"
    - "**/Sources/**"
    - "*.go"
    - "*.cs"
    - "*.ts"
    - "*.tsx"
    - "*.js"
    - "*.jsx"
    - "*.java"
    - "*.kt"
    - "*.kts"
    - "*.swift"
    - "*.rs"
    - "*.dart"
    - "*.rb"
    - "*.php"
    - "**/*.cs"
    - "scripts/ai_*.py"
  exclude:
    - "tests/**"
    - "**/tests/**"
    - "test/**"
    - "**/test/**"
    - "Tests/**"
    - "**/Tests/**"
    - "*.Tests/**/*"
    - "app/src/test/**"
    - "app/src/androidTest/**"
    - "**/src/test/**"
    - "**/src/androidTest/**"
    - "*test*"
    - "*spec*"
    - "*Test*"
    - "*Spec*"
    - "**/*test*"
    - "**/*spec*"
    - "**/*Test*"
    - "**/*Spec*"

tests:
  include:
    - "tests/**"
    - "**/tests/**"
    - "test/**"
    - "**/test/**"
    - "Tests/**"
    - "**/Tests/**"
    - "*.Tests/**/*"
    - "app/src/test/**"
    - "app/src/androidTest/**"
    - "**/src/test/**"
    - "**/src/androidTest/**"
    - "*test*"
    - "*spec*"
    - "*Test*"
    - "*Spec*"
    - "**/*test*"
    - "**/*spec*"
    - "**/*Test*"
    - "**/*Spec*"

# Each production path must match an association group, and at least one changed
# test path must match a test pattern after placeholders are expanded from that
# production path. Supported placeholders: {stem}, {module}, {name}, and {dir}.
associations:
  lifecycleSafetyGate:
    production:
      - "scripts/ai_safety_gate.py"
    tests:
      - "tests/test_lifecycle_safety_gate.py"
  coverageGuard:
    production:
      - "scripts/ai_check_coverage_guard.py"
    tests:
      - "tests/test_guards_and_status.py"
      - "tests/test_guard_failure_paths.py"
  remainingGovernanceHardening:
    production:
      - "scripts/ai_calibrate.py"
      - "scripts/ai_check_agent_risk.py"
      - "scripts/ai_check_backtrack.py"
      - "scripts/ai_check_guard_calibration.py"
      - "scripts/ai_check_guards.py"
      - "scripts/ai_check_review_policy.py"
      - "scripts/ai_check_scope.py"
      - "scripts/ai_check_summary.py"
      - "scripts/ai_observability.py"
      - "scripts/ai_project_profile.py"
      - "scripts/ai_start.py"
    tests:
      - "tests/test_project_governance.py"
      - "tests/test_start_and_archive.py"
  scenarioCoverageCheck:
    production:
      - "scripts/ai_check_scenario_coverage.py"
    tests:
      - "tests/test_governance_compression.py"
      - "tests/test_guards_and_status.py"
  preflightReview:
    production:
      - "scripts/ai_preflight_review.py"
    tests:
      - "tests/test_preflight_review.py"
      - "tests/test_readiness_policy.py"
  trustCriticalDomainGuards:
    production:
      - "scripts/ai_trust_guards.py"
      - "scripts/ai_critical_domain_guards.py"
    tests:
      - "tests/test_critical_domain_guards.py"
      - "tests/test_trust_guards.py"
  finishEvidence:
    production:
      - "scripts/ai_finish.py"
    tests:
      - "tests/**"
  lifecycleClosure:
    production:
      - "scripts/ai_close_work_item.py"
    tests:
      - "tests/test_work_item_lifecycle_closure.py"
  readinessPolicy:
    production:
      - "scripts/ai_scenario_policy.py"
    tests:
      - "tests/test_scenario_coverage_gate.py"
  reviewReadinessPolicy:
    production:
      - "scripts/ai_review_readiness_policy.py"
    tests:
      - "tests/**"
  riskPolicy:
    production:
      - "scripts/ai_risk_policy.py"
    tests:
      - "tests/**"
  workItemValidation:
    production:
      - "scripts/ai_check_work_item.py"
    tests:
      - "tests/**"
  sharedGovernanceCore:
    production:
      - "scripts/ai_common.py"
    tests:
      - "tests/**"
  prAggregate:
    production:
      - "scripts/ai_check_pr.py"
    tests:
      - "tests/test_pr_aggregate.py"
  adoptionReadiness:
    production:
      - "scripts/ai_check_adoption_ready.py"
    tests:
      - "tests/test_adoption_ready.py"
  configurationGate:
    production:
      - "scripts/ai_start.py"
    tests:
      - "tests/test_configuration_gate.py"
  cockpitStatus:
    production:
      - "scripts/ai_generate_status.py"
    tests:
      - "tests/test_guards_and_status.py"
      - "tests/test_core_gates.py"
  governanceCompression:
    production:
      - "scripts/ai_governance_compression.py"
    tests:
      - "tests/**"
  statusConsistency:
    production:
      - "scripts/ai_check_status_consistency.py"
    tests:
      - "tests/test_core_gates.py"
  statusCheck:
    production:
      - "scripts/ai_check_status.py"
    tests:
      - "tests/test_guards_and_status.py"
      - "tests/test_core_gates.py"
  workItemStart:
    production:
      - "scripts/ai_start.py"
    tests:
      - "tests/test_start_and_archive.py"
      - "tests/test_finish_e2e.py"
  startReceipt:
    production:
      - "scripts/ai_start_receipt.py"
      - "scripts/install_ai_cockpit.py"
      - "scripts/ai_check_diff_ownership.py"
      - "scripts/ai_check_scope.py"
      - "scripts/ai_check_summary.py"
    tests:
      - "tests/test_start_and_archive.py"
      - "tests/test_pr_aggregate.py"
      - "tests/test_installer.py"
  installedRuntimeSurface:
    production:
      - "scripts/ai_disable_enable.py"
      - "scripts/ai_rollback.py"
      - "scripts/ai_uninstall_proposal.py"
    tests:
      - "tests/test_installed_runtime_parity.py"
  archiveWorkItem:
    production:
      - "scripts/ai_archive_work_item.py"
    tests:
      - "tests/test_start_and_archive.py"
      - "tests/test_ai_archive_work_item.py"
  checkpointOwnership:
    production:
      - "scripts/ai_checkpoint.py"
    tests:
      - "tests/test_ai_checkpoint.py"
  byModule:
    production:
      - "**"
    tests:
      - "test_{stem}.*"
      - "test_{module}.*"
      - "{stem}_test.*"
      - "{module}_test.*"
      - "{stem}.test.*"
      - "{stem}.spec.*"
      - "{stem}Test.*"
      - "{stem}Tests.*"
      - "{stem}_spec.*"
      - "**/test_{stem}.*"
      - "**/test_{module}.*"
      - "**/{stem}_test.*"
      - "**/{module}_test.*"
      - "**/{stem}.test.*"
      - "**/{stem}.spec.*"
      - "**/{stem}Test.*"
      - "**/{stem}Tests.*"
      - "**/{stem}_spec.*"

output:
  json: target/ai_coverage_guard_report.json
